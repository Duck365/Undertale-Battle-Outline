<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Undertale Fight Box</title>
</head>
<body>
  <div class="container">
    <!-- Controls -->
    <div class="controls">
      <div>Z</div>
      <div>X</div>
      <div>↑</div>
      <div class="row">
        <div>←</div>
        <div>→</div>
      </div>
      <div>↓</div>
    </div>

    <!-- Main Fight Box -->
    <div class="fight-box">
      <div class="character">
        <img src="ulbsans.png" alt="ULB Sans">
      </div>
      <div class="soul"></div>
    </div>

    <!-- Action Menu -->
    <div class="action-menu">
      <div class="button fight">
        <span>FIGHT</span>
      </div>
      <div class="button act">
        <span>ACT</span>
      </div>
      <div class="button item">
        <span>ITEM</span>
      </div>
      <div class="button mercy">
        <span>MERCY</span>
      </div>
      <div class="selected-indicator"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
